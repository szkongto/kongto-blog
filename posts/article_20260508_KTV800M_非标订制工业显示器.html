<h2 id="1-产品概述">1. 产品概述</h2>
                <p>KTV800M 是深圳市江图科技有限公司推出的<strong>8寸非标订制工业显示器</strong>，采用紧凑型设计理念，在有限的安装空间内提供最大化的显示区域。特别适合紧凑型CNC数控系统、小型设备、嵌入式工控系统等应用场景。</p>

                <p>作为KTV系列的紧凑型型号，KTV800M 以<strong>8英寸</strong>显示面积为核心优势，最小化边框设计，是紧凑型CNC系统、便携设备的理想选择。</p>

<h2 id="2-核心技术参数">2. 核心技术参数</h2>
                <table>
                    <thead><tr><th>项目</th><th>规格/说明</th></tr>
</thead>
                    <tbody>
                        <tr><td><strong>型号</strong></td><td>KTV800M</td></tr>

                        <tr><td><strong>显示尺寸</strong></td><td>8 英寸（对角线）</td></tr>

                        <tr><td><strong>面板类型</strong></td><td>工业级 TFT-LCD（LED 背光）</td></tr>

                        <tr><td><strong>分辨率</strong></td><td>800×600 / 1024×768 可选</td></tr>

                        <tr><td><strong>亮度</strong></td><td>≥ 350 cd/m²</td></tr>

                        <tr><td><strong>工作温度</strong></td><td>-20°C ~ +60°C</td></tr>

                        <tr><td><strong>防护等级</strong></td><td>IP65 前面板</td></tr>

                        <tr><td><strong>供电</strong></td><td>DC 12V / 24V</td></tr>

                        <tr><td><strong>信号接口</strong></td><td>VGA、HDMI、AV</td></tr>

                        <tr><td><strong>寿命</strong></td><td>≥ 50,000 小时</td></tr>

                    </tbody>
                </table>
<h2 id="3-核心优势">3. 核心优势</h2>
                <ul>
                    <li><strong>8英寸紧凑设计</strong>：最小化边框，最大化显示区域，适合空间受限场景</li>

                    <li><strong>工业级面板</strong>：采用工业级TFT-LCD，LED背光，色彩还原准确</li>

                    <li><strong>灵活安装</strong>：支持嵌入式、壁挂、VESA等多种安装方式</li>

                    <li><strong>低功耗</strong>：LED背光技术，节能环保</li>

                    <li><strong>工业级品质</strong>：宽温工作，防尘防水IP65</li>

                </ul>

<h2 id="4-典型应用">4. 典型应用</h2>
                <ul>
                    <li>紧凑型CNC数控系统</li>

                    <li>小型设备显示</li>

                    <li>嵌入式工控终端</li>

                    <li>便携式检测设备</li>

                </ul>
